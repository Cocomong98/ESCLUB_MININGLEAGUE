version: "3.8"
services:
  app:
    build: .
    container_name: miningleague
    ports:
      - "35721:80"
    volumes:
      # Set this to your NAS/host deployment path
      - /path/to/your/deploy-dir:/app
    privileged: true
    restart: always
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-1}"
